name: github-activity
description: Correlate GitHub activity (commits, PRs, issues) with AI session timeframes
version: 1.0.0
input_schema:
  type: object
  properties:
    repository:
      type: string
      description: GitHub repository in format 'owner/repo' or 'all' for all repos
    timeframe:
      type: string
      enum: [today, yesterday, last-week, last-month]
      description: Time window for activity analysis
    activity_type:
      type: string
      enum: [commits, pulls, issues, all]
      description: Type of GitHub activity to analyze
  required: [timeframe]
output_schema:
  type: object
  properties:
    activities:
      type: array
      items:
        type: object
        properties:
          type: { type: string }
          timestamp: { type: string, format: date-time }
          repository: { type: string }
          title: { type: string }
          url: { type: string }
          files_changed: { type: array, items: { type: string } }
implementation:
  type: script
  path: ../skills/recall/scripts/github-correlate.py
  runtime: python3
  timeout: 45
annotations:
  requires_confirmation: false
  read_only: true
  cost: low